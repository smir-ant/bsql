# Run with: podman compose up -d
services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: sasql_test
      POSTGRES_USER: sasql
      POSTGRES_PASSWORD: sasql
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sasql -d sasql_test"]
      interval: 1s
      timeout: 3s
      retries: 10
